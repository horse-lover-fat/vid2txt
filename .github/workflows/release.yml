name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build
        run: cargo build --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --verbose

  build-macos:
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build macOS release binaries
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p dist
          tar czf dist/vid2txt-macos-aarch64.tar.gz \
            -C target/aarch64-apple-darwin/release vid2txt
          tar czf dist/vid2txt-macos-x86_64.tar.gz \
            -C target/x86_64-apple-darwin/release vid2txt

      - uses: actions/upload-artifact@v4
        with:
          name: vid2txt-macos
          path: |
            dist/vid2txt-macos-aarch64.tar.gz
            dist/vid2txt-macos-x86_64.tar.gz

  build-linux:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Linux release binary
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package release archive
        run: |
          mkdir -p dist
          tar czf "dist/vid2txt-linux-${{ matrix.arch }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" vid2txt

      - uses: actions/upload-artifact@v4
        with:
          name: vid2txt-linux-${{ matrix.arch }}
          path: dist/vid2txt-linux-${{ matrix.arch }}.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/vid2txt-macos-aarch64.tar.gz
            dist/vid2txt-macos-x86_64.tar.gz
            dist/vid2txt-linux-aarch64.tar.gz
            dist/vid2txt-linux-x86_64.tar.gz
